<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リベシティ市場 CRM</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #4a7c59;
    --green-light: #e8f5e9;
    --green-mid: #81b898;
    --brown: #6d4c41;
    --brown-light: #efebe9;
    --cream: #fdf6ec;
    --gray: #666;
    --border: #ddd;
    --shadow: 0 2px 8px rgba(0,0,0,0.1);
    --radius: 10px;
  }
  body { font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif; background: var(--cream); color: #333; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* ヘッダー */
  header { background: var(--green); color: white; padding: 14px 20px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); flex-shrink: 0; }
  header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.05em; }
  header .subtitle { font-size: 0.75rem; opacity: 0.8; margin-top: 2px; }
  .tab-btn { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 20px; padding: 6px 14px; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .tab-btn:hover { background: rgba(255,255,255,0.25); }
  .tab-btn.active { background: white; color: var(--green); border-color: white; }

  /* 発送管理 */
  .ship-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  .ship-table th { background: var(--green-light); color: var(--green); font-size: 0.78rem; font-weight: 700; padding: 10px 14px; text-align: left; border-bottom: 2px solid var(--green-mid); white-space: nowrap; }
  .ship-table td { padding: 12px 14px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
  .ship-table tr:hover td { background: var(--green-light); cursor: pointer; }
  .ship-table tr.today td { background: #fff8e1; }
  .ship-badge { display: inline-block; padding: 3px 10px; border-radius: 10px; font-size: 0.75rem; font-weight: 700; }
  .ship-badge.today { background: #fff3e0; color: #e65100; }
  .ship-badge.soon { background: #e8f5e9; color: var(--green); }
  .ship-badge.future { background: #f5f5f5; color: #888; }
  .ship-badge.overdue { background: #fce4ec; color: #c62828; }

  /* レイアウト */
  .layout { display: flex; flex: 1; overflow: hidden; }

  /* サイドバー */
  .sidebar { width: 280px; background: white; border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; }
  .sidebar-header input { flex: 1; padding: 7px 10px; border: 1px solid var(--border); border-radius: 20px; font-size: 0.85rem; outline: none; background: var(--cream); }
  .sidebar-header input:focus { border-color: var(--green-mid); }
  .btn-add-customer { background: var(--green); color: white; border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .btn-add-customer:hover { background: #3a6b49; }
  .customer-count { padding: 6px 16px; font-size: 0.75rem; color: var(--gray); background: var(--green-light); border-bottom: 1px solid var(--border); }
  .customer-list { flex: 1; overflow-y: auto; }
  .customer-item { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background 0.15s; display: flex; align-items: center; gap: 10px; }
  .customer-item:hover { background: var(--green-light); }
  .customer-item.active { background: var(--green-light); border-left: 3px solid var(--green); }
  .customer-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--green-mid); color: white; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: bold; flex-shrink: 0; }
  .customer-item-info { flex: 1; min-width: 0; }
  .customer-item-name { font-size: 0.9rem; font-weight: 600; }
  .customer-item-sub { font-size: 0.75rem; color: var(--gray); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .customer-badge { background: var(--green); color: white; border-radius: 10px; font-size: 0.7rem; padding: 2px 7px; flex-shrink: 0; }

  /* メインエリア */
  .main { flex: 1; overflow-y: auto; padding: 24px; background: var(--cream); }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--gray); gap: 12px; }
  .empty-state .icon { font-size: 4rem; }

  /* 顧客詳細 */
  .customer-detail { max-width: 760px; }
  .detail-header { background: white; border-radius: var(--radius); padding: 20px 24px; box-shadow: var(--shadow); display: flex; align-items: flex-start; gap: 16px; margin-bottom: 20px; }
  .detail-avatar { width: 60px; height: 60px; border-radius: 50%; background: var(--green); color: white; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; flex-shrink: 0; }
  .detail-info { flex: 1; }
  .detail-name { font-size: 1.3rem; font-weight: 700; margin-bottom: 6px; }
  .detail-meta { display: flex; gap: 16px; flex-wrap: wrap; }
  .detail-meta span { font-size: 0.82rem; color: var(--gray); display: flex; align-items: center; gap: 4px; }
  .detail-actions { display: flex; gap: 8px; }

  /* ボタン */
  .btn { padding: 7px 14px; border-radius: 6px; border: none; font-size: 0.82rem; cursor: pointer; font-weight: 600; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: var(--green); color: white; }
  .btn-secondary { background: white; color: var(--green); border: 1px solid var(--green); }
  .btn-danger { background: white; color: #e53935; border: 1px solid #e53935; }
  .btn-brown { background: var(--brown); color: white; }

  /* 統計 */
  .stats-row { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-card { background: white; border-radius: var(--radius); padding: 14px 18px; box-shadow: var(--shadow); flex: 1; min-width: 120px; text-align: center; }
  .stat-card .val { font-size: 1.6rem; font-weight: 700; color: var(--green); }
  .stat-card .lbl { font-size: 0.75rem; color: var(--gray); margin-top: 2px; }

  /* メモカード */
  .info-card { background: white; border-radius: var(--radius); padding: 16px 20px; box-shadow: var(--shadow); margin-bottom: 20px; }
  .info-card h3 { font-size: 0.85rem; color: var(--gray); margin-bottom: 8px; font-weight: 600; }
  .info-card p { font-size: 0.9rem; line-height: 1.6; color: #444; white-space: pre-wrap; }

  /* 購入履歴 */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .section-title { font-size: 1rem; font-weight: 700; color: var(--brown); }
  .history-list { display: flex; flex-direction: column; gap: 14px; }

  .history-card { background: white; border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow); border-left: 4px solid var(--green-mid); }
  .history-top { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .history-top-row1 { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .history-top-row2 { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .history-date-badge { font-size: 0.8rem; color: var(--gray); background: var(--green-light); padding: 4px 12px; border-radius: 12px; font-weight: 600; white-space: nowrap; }
  .history-product { font-size: 1rem; font-weight: 700; color: var(--brown); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .history-amount { font-size: 0.85rem; font-weight: 600; color: var(--green); background: var(--green-light); padding: 3px 10px; border-radius: 10px; }
  .history-actions { display: flex; gap: 6px; opacity: 1; }
  .btn-icon { background: none; border: 1px solid var(--border); border-radius: 4px; padding: 3px 8px; font-size: 0.75rem; cursor: pointer; color: var(--gray); }
  .btn-icon:hover { background: #f5f5f5; }
  .btn-icon.del:hover { color: #e53935; border-color: #e53935; }

  /* 豆グリッド */
  .bean-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-bottom: 14px; }
  .bean-item { background: var(--brown-light); border-radius: 8px; padding: 10px 14px; }
  .bean-item.bonus { background: #fff8e1; border: 1px dashed #f9a825; }
  .bean-label { font-size: 0.72rem; color: var(--gray); font-weight: 600; margin-bottom: 3px; }
  .bean-name { font-size: 0.9rem; font-weight: 600; color: var(--brown); }
  .bean-type { display: inline-block; font-size: 0.7rem; margin-top: 4px; padding: 2px 7px; border-radius: 8px; background: white; color: var(--brown); border: 1px solid var(--border); }
  .bean-item.bonus .bean-name { color: #e65100; }
  .bean-item.bonus .bean-type { background: white; color: #e65100; border-color: #f9a825; }

  /* メッセージカード */
  .message-box { background: #fffde7; border-left: 3px solid #f9a825; padding: 10px 14px; border-radius: 0 8px 8px 0; }
  .message-label { font-size: 0.72rem; color: #a0a0a0; margin-bottom: 5px; font-weight: 600; }
  .message-text { font-size: 0.88rem; color: #555; line-height: 1.7; white-space: pre-wrap; }

  /* メッセージリコメンド */
  .msg-recommend { margin-top: 8px; }
  .msg-recommend-header { font-size: 0.72rem; color: #a0a0a0; font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
  .msg-recommend-list { display: flex; flex-direction: column; gap: 6px; max-height: 180px; overflow-y: auto; }
  .msg-chip { background: #fffde7; border: 1px solid #f9a825; border-radius: 8px; padding: 8px 12px; font-size: 0.82rem; color: #555; line-height: 1.5; cursor: pointer; transition: all 0.15s; text-align: left; white-space: pre-wrap; }
  .msg-chip:hover { background: #fff8e1; border-color: #f57f17; }
  .msg-chip-meta { font-size: 0.68rem; color: #aaa; margin-top: 4px; }
  .msg-chip.used-for-this { opacity: 0.5; border-style: dashed; }
  .msg-chip.used-for-this::after { content: '（この方に送信済み）'; font-size: 0.68rem; color: #e65100; margin-left: 6px; }

  .empty-history { text-align: center; padding: 40px 20px; color: var(--gray); background: white; border-radius: var(--radius); box-shadow: var(--shadow); }

  /* モーダル */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 14px; padding: 28px; width: 520px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.2); animation: slideUp 0.2s ease; }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal h2 { font-size: 1.1rem; margin-bottom: 20px; color: var(--green); }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--gray); margin-bottom: 5px; }
  .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 7px; font-size: 0.9rem; outline: none; font-family: inherit; transition: border-color 0.15s; background: #fafafa; }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--green-mid); background: white; }
  .form-group textarea { resize: vertical; min-height: 90px; }
  .form-row { display: flex; gap: 12px; }
  .form-row .form-group { flex: 1; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }

  /* 豆入力行（銘柄＋豆/挽き豆） */
  .bean-input-row { display: flex; gap: 8px; align-items: flex-end; }
  .bean-input-row input { flex: 1; }
  .bean-input-row select { width: 120px; flex-shrink: 0; }

  /* 区切り線 */
  .modal-divider { border: none; border-top: 1px solid #f0f0f0; margin: 16px 0; }

  /* アバター画像 */
  .customer-avatar.has-photo,
  .detail-avatar.has-photo { background: transparent; overflow: hidden; padding: 0; }
  .customer-avatar.has-photo img,
  .detail-avatar.has-photo img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: block; }

  /* 発送一覧用ミニアバター */
  .ship-avatar { width: 22px; height: 22px; border-radius: 50%; overflow: hidden; flex-shrink: 0; background: var(--green-light); display: inline-flex; align-items: center; justify-content: center; border: 1px solid var(--green-mid); }
  .ship-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

  /* スクロールバー */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* トースト */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px); background: #333; color: white; padding: 10px 20px; border-radius: 24px; font-size: 0.85rem; z-index: 200; transition: transform 0.3s ease; pointer-events: none; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ロック画面 */
  #lockScreen { position: fixed; inset: 0; background: var(--green); z-index: 999; display: flex; align-items: center; justify-content: center; }
  #lockScreen.hidden { display: none; }
  .lock-box { background: white; border-radius: 18px; padding: 40px 36px; width: 320px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
  .lock-icon { font-size: 3rem; margin-bottom: 12px; }
  .lock-title { font-size: 1.1rem; font-weight: 700; color: var(--green); margin-bottom: 6px; }
  .lock-sub { font-size: 0.8rem; color: var(--gray); margin-bottom: 24px; }
  .lock-input { width: 100%; padding: 12px 16px; border: 2px solid var(--border); border-radius: 10px; font-size: 1rem; outline: none; text-align: center; letter-spacing: 0.1em; }
  .lock-input:focus { border-color: var(--green-mid); }
  .lock-btn { width: 100%; margin-top: 14px; padding: 12px; background: var(--green); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; }
  .lock-btn:hover { background: #3a6b49; }
  .lock-error { color: #e53935; font-size: 0.82rem; margin-top: 10px; display: none; }

  /* ===== iPad / タブレット対応 ===== */
  /* サイドバー戻るボタン（タブレット用、通常は非表示） */
  .sidebar-back { display: none; }
  /* デモモード */
  .demo-banner { display:none; padding:8px 16px; background:#ff6f00; color:white; text-align:center; font-size:0.85rem; font-weight:700; letter-spacing:1px; }
  .demo-banner.active { display:block; }
  body.demo-mode .detail-avatar.has-photo img { filter: blur(12px); }
  body.demo-mode .customer-avatar.has-photo img { filter: blur(12px); }
  body.demo-mode .ship-avatar img { visibility: hidden; }

  @media (max-width: 900px) {
    /* ヘッダー: ボタンを折り返し可能にする */
    header { flex-wrap: wrap; padding: 10px 14px; gap: 8px; }
    header h1 { font-size: 1rem; }
    .tab-btn { padding: 5px 10px; font-size: 0.75rem; }

    /* サイドバー幅を縮小 */
    .sidebar { width: 240px; }
  }

  @media (max-width: 768px) {
    /* タブレット縦向き: サイドバーを全幅オーバーレイに切り替え */
    .layout { position: relative; }
    .sidebar {
      position: absolute; inset: 0; z-index: 50;
      width: 100%; background: white;
      transition: transform 0.2s ease;
    }
    .sidebar.hidden-mobile { transform: translateX(-100%); pointer-events: none; }
    .main { width: 100%; }

    /* サイドバー内「戻る」ボタン表示 */
    .sidebar-back {
      display: flex; align-items: center; gap: 6px;
      padding: 10px 16px; background: var(--green-light);
      border: none; border-bottom: 1px solid var(--border);
      font-size: 0.85rem; font-weight: 600; color: var(--green);
      cursor: pointer; width: 100%;
    }

    /* ヘッダーにサイドバー表示ボタン追加用 */
    .btn-show-sidebar {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(255,255,255,0.15); color: white;
      border: 1px solid rgba(255,255,255,0.3); border-radius: 20px;
      padding: 5px 12px; font-size: 0.78rem; font-weight: 600; cursor: pointer;
    }

    /* 顧客詳細 */
    .customer-detail { max-width: 100%; }
    .detail-header { flex-direction: column; align-items: center; text-align: center; }
    .detail-actions { justify-content: center; }
    .stats-row { justify-content: center; }
    /* モバイル用「戻る」ボタン（詳細画面上部） */
    .mobile-back-btn {
      display: flex; align-items: center; gap: 6px;
      width: 100%; padding: 12px 16px; margin-bottom: 12px;
      background: var(--green-light); color: var(--green);
      border: 1px solid var(--green-mid); border-radius: 10px;
      font-size: 0.9rem; font-weight: 700; cursor: pointer;
    }

    /* モーダルをフル幅に */
    .modal { width: 95vw; max-width: 95vw; padding: 20px; }
  }
</style>
</head>
<body>

<!-- ロック画面 -->
<div id="lockScreen">
  <div class="lock-box">
    <div class="lock-icon">☕🔒</div>
    <div class="lock-title">リベシティ市場 CRM</div>
    <div class="lock-sub">メールアドレスとパスワードでログイン</div>
    <input type="email" id="lockEmail" class="lock-input" placeholder="メールアドレス" autocomplete="username"
      style="text-align:left;letter-spacing:normal;margin-bottom:10px"
      onkeydown="if(event.key==='Enter')document.getElementById('lockPassword').focus()">
    <input type="password" id="lockPassword" class="lock-input" placeholder="パスワード" autocomplete="current-password"
      style="text-align:left;letter-spacing:normal"
      onkeydown="if(event.key==='Enter')unlockApp()">
    <button class="lock-btn" id="lockBtn" onclick="unlockApp()">ログイン</button>
    <div class="lock-error" id="lockError">ログインに失敗しました</div>
  </div>
</div>

<header>
  <div style="font-size:1.8rem">☕</div>
  <div style="flex:1">
    <h1>リベシティ市場 CRM</h1>
    <div class="subtitle">お客様の豆・メッセージカード記録</div>
  </div>
  <button class="btn-show-sidebar" id="btnShowSidebar" onclick="showSidebar()" style="display:none">☰ 顧客一覧</button>
  <button class="tab-btn active" id="tabCRM" onclick="switchTab('crm')">👤 顧客管理</button>
  <button class="tab-btn" id="tabShip" onclick="switchTab('ship')">🚚 発送管理</button>
  <button class="tab-btn" id="tabSales" onclick="switchTab('sales')">📊 売上管理</button>
  <button class="tab-btn" id="tabAnalytics" onclick="switchTab('analytics')">📈 分析</button>
  <button class="tab-btn" onclick="exportBackupCSV()" title="顧客データをCSVバックアップ"
    style="background:none;border:1px solid rgba(255,255,255,0.3);color:white">💾 バックアップ</button>
  <button class="tab-btn" id="btnDemo" onclick="toggleDemoMode()" title="デモモード切替"
    style="background:none;border:1px solid rgba(255,255,255,0.3);color:white">🎭 デモ</button>
  <button class="tab-btn" id="btnLogout" onclick="logoutApp()" title="ログアウト"
    style="background:none;border:1px solid var(--border);color:#888">↪ ログアウト</button>
</header>
<div class="demo-banner" id="demoBanner">🎭 デモモード — 個人情報は非表示です（もう一度「🎭 デモ」を押すと解除）</div>

<div class="layout">
  <aside class="sidebar" id="sidebarPanel">
    <button class="sidebar-back" id="sidebarBack" onclick="hideSidebar()">← 詳細に戻る</button>
    <div class="sidebar-header">
      <input type="text" id="searchInput" placeholder="顧客を検索..." oninput="renderCustomerList()">
      <button onclick="toggleRealName()" id="btnEye" title="本名を表示する"
        style="background:white;border:1px solid var(--border);border-radius:50%;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#aaa;padding:0"></button>
      <button class="btn-add-customer" onclick="openCustomerModal()" title="顧客を追加">＋</button>
    </div>
    <div style="padding:4px 10px;border-bottom:1px solid var(--border);background:#fafafa;display:flex;align-items:center;gap:6px">
      <span style="font-size:0.72rem;color:#888;flex-shrink:0">並び順</span>
      <select id="sortSelect" onchange="renderCustomerList()" style="flex:1;font-size:0.75rem;border:1px solid var(--border);border-radius:4px;padding:3px 4px;background:white;color:#333">
        <option value="orderDate">最新注文日</option>
        <option value="roastDate">最新焙煎日</option>
        <option value="count">注文回数（多い順）</option>
        <option value="name">リベネーム順</option>
      </select>
    </div>
    <div style="padding:4px 10px;border-bottom:1px solid var(--border);background:#fafafa;display:flex;align-items:center;gap:6px">
      <span style="font-size:0.72rem;color:#888;flex-shrink:0">商品</span>
      <select id="productFilter" onchange="renderCustomerList()" style="flex:1;font-size:0.75rem;border:1px solid var(--border);border-radius:4px;padding:3px 4px;background:white;color:#333">
        <option value="all">すべて</option>
        <option value="single">シングルオリジン（豆・挽き豆）</option>
        <option value="drip">ドリップバッグ</option>
      </select>
    </div>
    <div style="padding:4px 10px;border-bottom:1px solid var(--border);background:#fafafa;display:flex;align-items:center;gap:4px">

// ===== Firebase設定 =====
const firebaseConfig = {

// ===== Firebase Authentication によるログイン =====
let _firestoreListenerStarted = false;
async function unlockApp() {
  const email = document.getElementById('lockEmail').value.trim();
  const pw = document.getElementById('lockPassword').value;
  const err = document.getElementById('lockError');
  const btn = document.getElementById('lockBtn');
  if (!email || !pw) {
    err.textContent = 'メールアドレスとパスワードを入力してください';
    err.style.display = 'block';
    return;
  }
  btn.disabled = true;
  btn.textContent = 'ログイン中...';
  err.style.display = 'none';
  try {
    await auth.signInWithEmailAndPassword(email, pw);
    // 成功後は onAuthStateChanged が後処理を担当
  } catch (e) {
    console.error(e);
    const code = e && e.code || '';
    let msg = 'ログインに失敗しました';
    if (code === 'auth/invalid-email') msg = 'メールアドレスの形式が正しくありません';
    else if (code === 'auth/user-not-found' || code === 'auth/wrong-password' || code === 'auth/invalid-credential' || code === 'auth/invalid-login-credentials') msg = 'メールアドレスまたはパスワードが違います';
    else if (code === 'auth/too-many-requests') msg = '試行回数が多すぎます。しばらくしてから再試行してください';
    else if (code === 'auth/network-request-failed') msg = 'ネットワークエラーが発生しました';
    err.textContent = msg;
    err.style.display = 'block';
    document.getElementById('lockPassword').value = '';
    document.getElementById('lockPassword').focus();
  } finally {
    btn.disabled = false;
    btn.textContent = 'ログイン';
  }
}
async function logoutApp() {
  if (!confirm('ログアウトしますか？')) return;
  try {
    await auth.signOut();
    location.reload();
  } catch (e) {
    showToast('⚠️ ログアウトに失敗しました');
    console.error(e);
  }
}
// ログイン状態を監視
auth.onAuthStateChanged(user => {
  const lock = document.getElementById('lockScreen');
  if (user) {
    // ログイン済み
    lock.classList.add('hidden');
    document.getElementById('lockPassword').value = '';
    if (!_firestoreListenerStarted) {
      _firestoreListenerStarted = true;
      startFirestoreListener();
    }
  } else {
    // 未ログイン
    lock.classList.remove('hidden');
    setTimeout(()=>{
      const emailEl = document.getElementById('lockEmail');
      if (emailEl && !emailEl.value) emailEl.focus();
      else document.getElementById('lockPassword').focus();
    }, 50);
  }
});

// ===== ローカル日付（JST）を YYYY-MM-DD で取得 =====
// toISOString() は UTC を返すため、日本時間の早朝だと前日になってしまう
function todayLocal() {
  const d = new Date();
  return d.getFullYear() + '-' +
         String(d.getMonth() + 1).padStart(2, '0') + '-' +
         String(d.getDate()).padStart(2, '0');
}

// ===== 発送管理 =====
function renderShipmentList() {
  const today = todayLocal();
  const items = [];
  customers.forEach(c => {
    (c.history||[]).forEach(h => {
      if (h.shipDate && !h.shipped) {
        items.push({ c, h });
      }
    });
  });
  items.sort((a, b) => a.h.shipDate.localeCompare(b.h.shipDate));

  const main = document.getElementById('main');
  if (!items.length) {
    main.innerHTML = `<div class="empty-state"><div class="icon">🚚</div><p>発送予定はありません</p></div>`;
    return;
  }

  const rows = items.map(({ c, h }) => {
    const diff = Math.round((new Date(h.shipDate) - new Date(today)) / 86400000);
    const badgeCls = diff < 0 ? 'overdue' : diff === 0 ? 'today' : diff <= 3 ? 'soon' : 'future';
    const badgeText = diff < 0 ? `${Math.abs(diff)}日遅れ` : diff === 0 ? '今日' : diff === 1 ? '明日' : `${diff}日後`;
    // 発送一覧の名前セル: リベネームの左に顧客のプロフィール画像（photoUrl）を表示。
    // 画像が無ければリーフアイコンにフォールバック。
    const initial = escHtml((c.name||'?').charAt(0));
    const avatar = c.photoUrl
      ? `<span class="ship-avatar"><img src="${escHtml(c.photoUrl)}" alt="${initial}" onerror="var p=this.parentElement;p.innerHTML='${initial}';p.style.fontSize='0.7rem';p.style.color='var(--green)';p.style.fontWeight='700'"></span>`
      : `<span class="ship-avatar">${leafIcon(14)}</span>`;
    const name = c.libeName
      ? `<span style="display:inline-flex;align-items:center;gap:6px">${avatar}<span>${displayLibeName(c)}</span></span><br><span style="font-size:0.75rem;color:#aaa;margin-left:28px">${maskedName(c)}</span>`

function exportSalesCSV(year) {
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const monthly = Array.from({length:12}, (_,i) => ({ month: i+1, count: 0, amount: 0 }));
  customers.forEach(c => {
    (c.history||[]).forEach(h => {
      if (!h.date || !h.amount) return;
      if (parseInt(h.date.slice(0,4)) !== year) return;
      const month = parseInt(h.date.slice(5,7));
      monthly[month-1].count++;
      monthly[month-1].amount += parseInt(h.amount) || 0;
    });
  });
  const totalAmount = monthly.reduce((s,m) => s + m.amount, 0);
  const totalCount  = monthly.reduce((s,m) => s + m.count, 0);

  let csv = '﻿月,件数,売上金額\n';
  monthly.forEach(m => { csv += `${months[m.month-1]},${m.count},${m.amount}\n`; });
  csv += `合計,${totalCount},${totalAmount}\n`;

  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `売上管理_${year}年.csv`;
  a.click();
}

// ===== 分析（商品別・銘柄別・リピート予測・月別予測）=====
let analyticsYear = 2026;

function renderAnalytics() {
  const main = document.getElementById('main');
  const today = todayLocal();

  // === 商品別集計 ===
  const productStats = {};
  customers.forEach(c => {
    (c.history||[]).forEach(h => {
      if (!h.date || !h.product) return;
      if (parseInt(h.date.slice(0,4)) !== analyticsYear) return;
      if (!productStats[h.product]) productStats[h.product] = { count: 0, amount: 0 };
      productStats[h.product].count++;
      productStats[h.product].amount += parseInt(h.amount) || 0;
    });
  });
  const productRows = Object.entries(productStats)
    .sort((a,b) => b[1].amount - a[1].amount)
    .map(([p, s]) => `
      <tr>
        <td style="padding:8px 14px">${escHtml(p)}</td>
        <td style="padding:8px 14px;text-align:right">${s.count}件</td>
        <td style="padding:8px 14px;text-align:right;font-weight:600">¥${s.amount.toLocaleString()}</td>
      </tr>`).join('');

  // === 銘柄別集計（豆の使用回数）===
  const beanStats = {};
  customers.forEach(c => {
    (c.history||[]).forEach(h => {
      if (!h.date) return;
      if (parseInt(h.date.slice(0,4)) !== analyticsYear) return;
      ['bean1','bean2','bean3','bean4','bean5','bean6','bonusBean'].forEach(field => {
        const bean = h[field];
        if (!bean) return;
        beanStats[bean] = (beanStats[bean] || 0) + 1;
      });
    });
  });
  const beanRows = Object.entries(beanStats)
    .sort((a,b) => b[1] - a[1])
    .map(([b, n], i) => `
      <tr>
        <td style="padding:8px 14px">${i===0?'🥇 ':i===1?'🥈 ':i===2?'🥉 ':'　 '}${escHtml(b)}</td>
        <td style="padding:8px 14px;text-align:right;font-weight:600">${n}回</td>
      </tr>`).join('');

  // === リピート予測 ===
  const predictions = [];
  customers.forEach(c => {
    const orders = (c.history||[])
      .filter(h => h.date && h.amount)
      .sort((a,b) => a.date.localeCompare(b.date));
    if (orders.length < 2) return;

    const intervals = [];
    for (let i = 1; i < orders.length; i++) {
      const days = Math.round((new Date(orders[i].date) - new Date(orders[i-1].date)) / 86400000);
      intervals.push(days);
    }
    const avgInterval = Math.round(intervals.reduce((a,b)=>a+b,0) / intervals.length);
    const lastOrder = orders[orders.length-1];
    const predDate = new Date(new Date(lastOrder.date).getTime() + avgInterval * 86400000)
      .toISOString().slice(0,10);
    const totalAmount = orders.reduce((s,o) => s + (parseInt(o.amount) || 0), 0);
    const avgAmount = Math.round(totalAmount / orders.length);

    predictions.push({
      customer: c, lastDate: lastOrder.date, avgInterval, predDate, avgAmount, orderCount: orders.length
    });
  });
  predictions.sort((a,b) => a.predDate.localeCompare(b.predDate));

  const predictionRows = predictions.slice(0, 15).map(p => {
    const diff = Math.round((new Date(p.predDate) - new Date(today)) / 86400000);
    const status = diff < 0 ? `<span style="color:#c62828">${Math.abs(diff)}日経過</span>`
                : diff === 0 ? `<span style="color:#e65100;font-weight:700">本日</span>`
                : diff <= 7  ? `<span style="color:var(--green);font-weight:700">${diff}日後</span>`
                : `<span style="color:#888">${diff}日後</span>`;
    return `
      <tr>
        <td style="padding:8px 14px">${escHtml(displayLibeName(p.customer) || maskedName(p.customer))}</td>
        <td style="padding:8px 14px;text-align:right;font-size:0.82rem">${formatDate(p.lastDate)}</td>
        <td style="padding:8px 14px;text-align:right;font-size:0.82rem">${p.avgInterval}日</td>
        <td style="padding:8px 14px;text-align:right;font-size:0.82rem">${formatDate(p.predDate)}<br>${status}</td>
        <td style="padding:8px 14px;text-align:right">¥${p.avgAmount.toLocaleString()}</td>
      </tr>`;
  }).join('');

  // === 月別予測（今月含む3ヶ月）===
  const todayObj = new Date(today);
  const months = [];
  for (let i = 0; i < 3; i++) {
    const d = new Date(todayObj.getFullYear(), todayObj.getMonth() + i, 1);
    months.push({ year: d.getFullYear(), month: d.getMonth()+1, confirmed: 0, predicted: 0 });
  }

  customers.forEach(c => {
    (c.history||[]).forEach(h => {
      if (!h.date || !h.amount) return;
      const y = parseInt(h.date.slice(0,4));
      const m = parseInt(h.date.slice(5,7));
      const month = months.find(mo => mo.year === y && mo.month === m);
      if (month) month.confirmed += parseInt(h.amount) || 0;
    });
  });

  predictions.forEach(p => {
    if (p.predDate < today) return;
    const y = parseInt(p.predDate.slice(0,4));
    const m = parseInt(p.predDate.slice(5,7));
    const month = months.find(mo => mo.year === y && mo.month === m);
    if (month) month.predicted += p.avgAmount;
  });

  const forecastRows = months.map(m => `
    <tr>
      <td style="padding:8px 14px;font-weight:600">${m.year}年${m.month}月</td>
      <td style="padding:8px 14px;text-align:right;font-size:0.82rem;color:var(--green)">¥${m.confirmed.toLocaleString()}</td>
      <td style="padding:8px 14px;text-align:right;font-size:0.82rem;color:#888">+¥${m.predicted.toLocaleString()}</td>
      <td style="padding:8px 14px;text-align:right;font-weight:700;color:var(--brown)">¥${(m.confirmed+m.predicted).toLocaleString()}</td>
    </tr>`).join('');

  main.innerHTML = `
    <div style="padding:24px;max-width:760px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
        <button onclick="analyticsYear--;renderAnalytics()" style="background:white;border:1px solid var(--border);border-radius:6px;padding:4px 12px;cursor:pointer">◀</button>
        <div style="font-size:1.1rem;font-weight:700;color:var(--brown)">${analyticsYear}年 分析</div>
        <button onclick="analyticsYear++;renderAnalytics()" style="background:white;border:1px solid var(--border);border-radius:6px;padding:4px 12px;cursor:pointer">▶</button>
      </div>

      <!-- 商品別 -->
      <div style="background:white;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px">
        <div style="padding:14px 18px;font-weight:700;color:var(--brown);border-bottom:1px solid var(--border)">📦 商品別売上（${analyticsYear}年）</div>
        <table style="width:100%;border-collapse:collapse;font-size:0.88rem">
          <thead><tr style="background:var(--green-light);font-size:0.8rem;color:var(--gray)">
            <th style="padding:8px 14px;text-align:left">商品</th>
            <th style="padding:8px 14px;text-align:right">件数</th>
            <th style="padding:8px 14px;text-align:right">売上金額</th>
          </tr></thead>
          <tbody>${productRows || `<tr><td colspan="3" style="padding:20px;text-align:center;color:#aaa">まだデータがありません</td></tr>`}</tbody>
        </table>
      </div>

      <!-- 銘柄別 -->
      <div style="background:white;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px">
        <div style="padding:14px 18px;font-weight:700;color:var(--brown);border-bottom:1px solid var(--border)">☕ 銘柄別ランキング（${analyticsYear}年）</div>
        <div style="padding:8px 18px;font-size:0.75rem;color:#aaa;border-bottom:1px solid var(--border)">※ シングルオリジン注文での使用回数。1注文で2銘柄使った場合は各1回として集計</div>
        <table style="width:100%;border-collapse:collapse;font-size:0.88rem">
          <thead><tr style="background:var(--green-light);font-size:0.8rem;color:var(--gray)">
            <th style="padding:8px 14px;text-align:left">銘柄</th>
            <th style="padding:8px 14px;text-align:right">使用回数</th>
          </tr></thead>
          <tbody>${beanRows || `<tr><td colspan="2" style="padding:20px;text-align:center;color:#aaa">まだデータがありません</td></tr>`}</tbody>
        </table>
      </div>

      <!-- リピート予測 -->
      <div style="background:white;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px">
        <div style="padding:14px 18px;font-weight:700;color:var(--brown);border-bottom:1px solid var(--border)">🔁 リピート予測（次回予想日が近い順 上位15名）</div>
        <div style="padding:8px 18px;font-size:0.75rem;color:#aaa;border-bottom:1px solid var(--border)">※ 過去2回以上注文があるお客様が対象。「最終注文日 + 平均間隔」を予測値としています</div>
        <table style="width:100%;border-collapse:collapse;font-size:0.88rem">
          <thead><tr style="background:var(--green-light);font-size:0.8rem;color:var(--gray)">
            <th style="padding:8px 14px;text-align:left">お名前</th>
            <th style="padding:8px 14px;text-align:right">最終注文</th>
            <th style="padding:8px 14px;text-align:right">平均間隔</th>
            <th style="padding:8px 14px;text-align:right">次回予想</th>
            <th style="padding:8px 14px;text-align:right">想定金額</th>
          </tr></thead>
          <tbody>${predictionRows || `<tr><td colspan="5" style="padding:20px;text-align:center;color:#aaa">まだ予測データがありません（2回以上の注文履歴が必要）</td></tr>`}</tbody>
        </table>
      </div>

      <!-- 月別予測 -->
      <div style="background:white;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px">
        <div style="padding:14px 18px;font-weight:700;color:var(--brown);border-bottom:1px solid var(--border)">📅 今後3ヶ月の売上予測</div>
        <div style="padding:8px 18px;font-size:0.75rem;color:#aaa;border-bottom:1px solid var(--border)">※ 確定 = すでに記録された注文 / 予測 = リピート予測の合計</div>
        <table style="width:100%;border-collapse:collapse;font-size:0.88rem">

            <th style="padding:8px 14px;text-align:left">月</th>

            <th style="padding:8px 14px;text-align:right">予測</th>
            <th style="padding:8px 14px;text-align:right">合計見込み</th>
          </tr></thead>
          <tbody>${forecastRows}</tbody>
        </table>
      </div>
    </div>`;

// ===== 発送済みチェック =====
function toggleCheckAll(master) {
  document.querySelectorAll('.ship-check').forEach(cb => cb.checked = master.checked);
}

async function markSelectedAsShipped() {
  const checked = document.querySelectorAll('.ship-check:checked');
  if (!checked.length) { showToast('チェックされた項目がありません'); return; }
  if (!confirm(`${checked.length}件を発送済みにしますか？`)) return;

  const updates = {};
  checked.forEach(cb => {
    const row = cb.closest('tr');
    const cid = row.dataset.cid;
    const hid = row.dataset.hid;
    if (!updates[cid]) updates[cid] = [];
    updates[cid].push(hid);
  });

  for (const [cid, hids] of Object.entries(updates)) {
    const c = getCustomer(cid);
    hids.forEach(hid => {
      const h = c.history.find(x => x.id === hid);
      if (h) h.shipped = true;
    });
    await dbSave(c);
  }
  showToast(`✅ ${checked.length}件を発送済みにしました`);
  renderShipmentList();
}

// ===== 住所を行に分割 =====
// ClickPost制限: 1行あたり全角20文字 または 半角40文字
// 半角英数記号=1、全角=2 として幅を計算し、なるべく自然な境界で改行
function splitJapaneseAddress(addr) {
  // 全角数字→半角、各種ハイフン→半角ハイフン、全角スペース→半角スペース
  // （長音記号 ー はそのまま保持）
  addr = addr.replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
             .replace(/[－−‐]/g, '-')
             .replace(/　/g, ' ')
             .trim();

  const MAX = 40;   // 半角幅ベース上限（= 全角20文字相当）
  const H = '[-ー]'; // ハイフン類（長音記号ーも番地の区切りとして許容）

  // 文字列の表示幅（半角=1、全角=2）
  const widthOf = s => {
    let w = 0;
    for (const c of s) {
      const cp = c.codePointAt(0);
      if (cp <= 0x7E) w += 1;                           // ASCII
      else if (cp >= 0xFF61 && cp <= 0xFF9F) w += 1;    // 半角カナ
      else w += 2;                                      // 全角
    }
    return w;
  };

  // 末尾のマンション名+部屋番号を分離
  const splitRoom = s => {
    const m = s.match(/^(.+?)[\s,，、]*([0-9]+(?:号室|号|F|階)?)\s*$/);
    if (m && m[1].trim() && /[ァ-ヴー一-龥a-zA-Z]/.test(m[1])) {
      return [m[1].replace(/[\s,，、]+$/, '').trim(), m[2].trim()];
    }
    return [s, ''];
  };

  // 自然な境界（空白・カンマ）で maxW 以内の位置を探して2分割。
  // 境界が見つからなければ width で切る。
  const splitAtBoundary = (s, maxW) => {
    const chars = [...s];
    let bestCut = -1;
    let hardCut = 0;
    let w = 0;
    for (let i = 0; i < chars.length; i++) {
      const cw = widthOf(chars[i]);
      if (w + cw > maxW) break;
      w += cw;
      hardCut = i + 1;
      if (/[\s,，、]/.test(chars[i])) bestCut = i + 1;
    }
    const cut = bestCut > 0 ? bestCut : hardCut;
    return [
      s.slice(0, cut).replace(/[\s,，、]+$/, '').trim(),
      s.slice(cut).replace(/^[\s,，、]+/, '').trim()
    ];
  };

  // パターンA: スペース区切り最優先
  //  ※ 2行に収まるならそれを最優先。3行目はあふれた時の保険。
  const spaceRe = new RegExp(`^(.*?[0-9]+(?:${H}[0-9]+)*(?:丁目|番地?|号)?)\\s+(.+)$`);
  const spaceMatch = addr.match(spaceRe);
  if (spaceMatch && widthOf(spaceMatch[1]) <= MAX) {
    const street = spaceMatch[1];
    const rest = spaceMatch[2];
    if (widthOf(rest) <= MAX) return [street, rest, '', ''];              // 2行で収まる
    const [mansion, room] = splitRoom(rest);
    if (room && widthOf(mansion) <= MAX) return [street, mansion, room, '']; // 3行に分離
    const [a1, a2] = splitAtBoundary(rest, MAX);
    return [street, a1, a2, ''];
  }

  // パターンB: 地名（漢字・かな）→番地（数字）の境界で分割
  // 例: 「大阪府大阪市中央区上町1-1-26ー805」 → 1行で収まる
  // 例: 「東京都小金井市本町4-3-19Maison de Lara, Ouest 201」
  //   → ["東京都小金井市本町4-3-19", "Maison de Lara, Ouest 201"]（2行）
  const placeNumMatch = addr.match(/^([^\s0-9]+?)([0-9].*)$/);
  if (placeNumMatch) {
    const placeName = placeNumMatch[1];
    const rest = placeNumMatch[2];
    const blockRe = new RegExp(`^([0-9]+(?:${H}[0-9]+)*(?:丁目|番地?|号)?)(.*)$`);
    const blockMatch = rest.match(blockRe);
    if (blockMatch && widthOf(placeName) <= MAX) {
      const block = blockMatch[1];
      const after = blockMatch[2].trim();
      const combined = placeName + block;

      if (!after) {
        if (widthOf(combined) <= MAX) return [combined, '', '', ''];
        return [placeName, block, '', ''];
      }

      if (widthOf(combined) <= MAX) {
        // 「地名+番地」を1行目にまとめられる
        if (widthOf(after) <= MAX) return [combined, after, '', '']; // 2行で収まる（最優先）
        const [mansion, room] = splitRoom(after);
        if (room && widthOf(mansion) <= MAX) return [combined, mansion, room, ''];
        const [a1, a2] = splitAtBoundary(after, MAX);
        return [combined, a1, a2, ''];
      } else {
        // 「地名+番地」が長いので 地名/番地 で分割
        if (widthOf(after) <= MAX) return [placeName, block, after, ''];
        const [mansion, room] = splitRoom(after);
        if (room && widthOf(mansion) <= MAX) return [placeName, block, mansion, room];
        const [a1, a2] = splitAtBoundary(after, MAX);
        return [placeName, block, a1, a2];
      }
    }
  }

  // パターンC: そのまま MAX 以内 → 1行目だけ
  if (widthOf(addr) <= MAX) return [addr, '', '', ''];

  // パターンD: 境界ベースで分割
  const [p1, p2] = splitAtBoundary(addr, MAX);
  return [p1, p2, '', ''];
}

// プロフィールURLの正規化（末尾の / や http/https の揺れを吸収）
function normalizeProfileUrl(u) {
  if (!u) return '';
  return String(u).trim()
    .replace(/^http:\/\//i, 'https://')
    .replace(/\/+$/, '')
    .toLowerCase();
}

// リベシティの注文情報から顧客を検索
//   プロフィールURL（最も確実・表示名変更の影響を受けない）
//    → リベネーム → 氏名 の順でフォールバック
function findCustomerByLibeInfo(profileUrl, libeName, realName) {
  if (!Array.isArray(customers) || !customers.length) return null;
  // 1. プロフィールURL（推奨）
  const targetUrl = normalizeProfileUrl(profileUrl);
  if (targetUrl) {
    const match = customers.find(c => normalizeProfileUrl(c.profileUrl) === targetUrl);
    if (match) return match;
  }
  // 2. リベネーム
  if (libeName) {
    const ln = libeName.trim();
    const match = customers.find(c => c.libeName && c.libeName.trim() === ln);
    if (match) return match;
  }
  // 3. 氏名（空白無視）
  if (realName) {
    const rn = realName.replace(/\s+/g, '');
    const match = customers.find(c => c.name && c.name.replace(/\s+/g, '') === rn);
    if (match) return match;
  }
  return null;
}

// 発送予定一覧（顧客ごとの履歴）から豆/挽き豆の設定を取得
//   beanGrind が入っている直近の履歴を優先（手入力のため最も正確）。
function findShippingBeanGrind(profileUrl, libeName, realName) {
  const customer = findCustomerByLibeInfo(profileUrl, libeName, realName);
  if (!customer || !Array.isArray(customer.history) || !customer.history.length) {
    return { grind: null, matchedBy: null, customer: null };
  }
  const withGrind = customer.history
    .filter(h => h.beanGrind === '豆のまま' || h.beanGrind === '挽き豆')
    .sort((a, b) => (b.shipDate || b.date || '').localeCompare(a.shipDate || a.date || ''));
  // どのキーで一致したか
  let matchedBy = null;
  if (profileUrl && normalizeProfileUrl(customer.profileUrl) === normalizeProfileUrl(profileUrl)) matchedBy = 'url';
  else if (libeName && customer.libeName && customer.libeName.trim() === libeName.trim()) matchedBy = 'libeName';
  else matchedBy = 'name';
  return {
    grind: withGrind[0] ? withGrind[0].beanGrind : null,
    matchedBy,
    customer
  };
}

// 内容品を判定
//   ドリップ系 → 商品タイトルで判定
//   挽き豆/豆のまま → 「特記事項」のうち、ユーザー回答部分（「→」で始まる行）だけを見る。
//   リベシティのテンプレート文言には必ず「■挽き豆をご希望の方も…」「豆のままでお届けいたします」が
//   入っているため、全文に対して「挽き」をキーワード検索すると常に誤判定する。
function detectContent(product, notes) {
  const prod = product || '';
  if (prod.includes('ドリップ')) return 'ドリップバッグコーヒー';

  const text = notes || '';
  // 「→」(全角/半角/絵文字いずれも) で始まる行 = ユーザーがテンプレに記入した回答
  const arrowLines = text.match(/[→➡➔][^\n]*/g);
  const userText = arrowLines && arrowLines.length ? arrowLines.join('\n') : text;

  // 明示的な挽き豆リクエストを検出
  const mentionsGrind = /挽[きい]/.test(userText);
  // 否定形（例: 「挽き豆にしないで」「挽かずに」）は除外
  const negated = /挽[きい][^。\n]{0,15}(しないで|せず|なし|不要|ではなく|じゃなく)/.test(userText);

  if (mentionsGrind && !negated) return 'コーヒー豆（挽き豆）';
  return 'コーヒー豆';
}

async function generateClickpostCSV(input) {
  const file = input.files[0];
  if (!file) return;
  const status = document.getElementById('clickpostStatus');
  status.textContent = '処理中...';

  try {
    const buffer = await file.arrayBuffer();
    // 文字コード自動判定:
    //   1. UTF-8 BOM付き → UTF-8
    //   2. UTF-8として正常に読めれば → UTF-8（BOMなしUTF-8対応）
    //   3. どちらでもなければ → Shift-JIS
    const bytes = new Uint8Array(buffer);
    let text;
    if (bytes[0] === 0xEF && bytes[1] === 0xBB && bytes[2] === 0xBF) {
      text = new TextDecoder('utf-8').decode(buffer); // UTF-8 BOM付き
    } else {
      try {
        text = new TextDecoder('utf-8', { fatal: true }).decode(buffer); // BOMなしUTF-8
      } catch (e) {
        text = new TextDecoder('shift-jis').decode(buffer); // Shift-JIS
      }
    }
    const rows = parseCSVRows(text);
    if (rows.length < 2) { status.textContent = 'データが見つかりませんでした'; return; }

    _clickpostData = [];
    for (let i = 1; i < rows.length; i++) {
      const cols = rows[i];
      if (cols.length < 10) continue;
      const libeName = (cols[6]||'').trim();  // 購入者の名前（リベネーム）
      const profileUrl = (cols[7]||'').trim(); // 購入者のプロフィールURL（マッチングの主キー）
      const addressRaw = (cols[8]||'').trim();
      const name = (cols[9]||'').trim();       // 配送先氏名
      const product = (cols[2]||'').trim();
      const notes = (cols[11]||'').trim();
      if (!addressRaw || !name) continue;
      const zipMatch = addressRaw.match(/〒?(\d{3})-?(\d{4})/);
      const zip = zipMatch ? zipMatch[1] + zipMatch[2] : '';
      // リベシティ側でShift-JIS非対応文字（EM DASH等）が"?"に化けているので"-"に戻す
      const addrFull = addressRaw
        .replace(/〒?\d{3}-\d{4}\s*/, '')
        .replace(/\?/g, '-')
        .trim();
      const [address1, address2, address3, address4] = splitJapaneseAddress(addrFull);

      // 内容品の決定:
      //  1. ドリップ商品なら商品名で確定
      //  2. 発送予定一覧の履歴から beanGrind を引けるならそれを優先（手入力のため最も正確）
      //     マッチング優先度: プロフィールURL > リベネーム > 氏名
      //  3. 取れなければ備考テキストから推定
      let content;
      let contentSource = 'text';
      let matchedBy = null;
      if (product.includes('ドリップ')) {
        content = 'ドリップバッグコーヒー';
        contentSource = 'product';
      } else {
        const match = findShippingBeanGrind(profileUrl, libeName, name);
        matchedBy = match.matchedBy;
        if (match.grind === '挽き豆') {
          content = 'コーヒー豆（挽き豆）'; contentSource = 'history';
        } else if (match.grind === '豆のまま') {
          content = 'コーヒー豆'; contentSource = 'history';
        } else {
          content = detectContent(product, notes);
          contentSource = 'text';
        }
      }

      _clickpostData.push({
        zip, name, libeName, profileUrl, honorific: '様',
        address1, address2, address3, address4,
        content, contentSource, matchedBy,
        selected: true,
        addrOriginal: addrFull
      });
    }

    if (!_clickpostData.length) { status.textContent = '有効なデータが見つかりませんでした'; return; }

    status.textContent = '';
    input.value = '';
    renderClickpostSelection();
    // 郵便番号と住所の整合性チェック（バックグラウンド実行）
    verifyZipCodes();
  } catch(e) {
    status.textContent = '⚠️ 読み込みに失敗しました';
    console.error(e);
  }
}

// 数字列だけを抽出（不一致チェック用）
function _clickpostDigits(s) { return (s||'').replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0)).replace(/[^0-9]/g, ''); }

  const inp = (val, field, i, w) =>
    `<input type="text" value="${escHtml(val||'')}" oninput="_clickpostData[${i}].${field}=this.value;_clickpostRecheck(${i})"

      style="padding:4px 6px;border:1px solid #ddd;border-radius:4px;font-size:0.8rem;font-family:inherit">

      : `<span title="元の住所と数字が一致しています" style="display:inline-block;color:#2e7d32;font-size:0.8rem;margin-left:4px">✓</span>`;
    return `
    <tr data-ci="${i}" style="border-bottom:1px solid #f0f0f0;${rowBg}">
      <td style="text-align:center;padding:6px 4px;vertical-align:top">
        <input type="checkbox" ${r.selected?'checked':''} onchange="_clickpostData[${i}].selected=this.checked">
      </td>
      <td style="padding:4px;vertical-align:top">
        ${demoMode ? '<span style="color:#aaa">●●●-●●●●</span>' : inp(r.zip,'zip',i,'90px')}

      <td style="padding:4px;vertical-align:top">
        ${demoMode ? '<span style="color:#aaa">●●● ●●●</span>' : inp(r.name,'name',i,'110px')}
        ${r.libeName ? `<div style="font-size:0.72rem;color:#4a8a4c;margin-top:3px;word-break:break-all;line-height:1.3">🌿 ${demoMode ? _demoNames[i % _demoNames.length] + 'さん' : escHtml(r.libeName)}</div>` : ''}
      </td>
      <td style="padding:4px;vertical-align:top">${sel(r.honorific||'様','honorific',i,['様','御中'])}</td>
      <td style="padding:4px;vertical-align:top;max-width:200px">
        <div style="font-size:0.78rem;color:#555;word-break:break-all;line-height:1.35">${demoMode ? '●●県●●市●●町●-●-●' : escHtml(r.addrOriginal||'')}</div>
        <div data-badge style="margin-top:3px">${badge}</div>
      </td>
      <td style="padding:4px;vertical-align:top">${demoMode ? '<span style="color:#aaa">●●●</span>' : inp(r.address1,'address1',i,'170px')}</td>
      <td style="padding:4px;vertical-align:top">${demoMode ? '<span style="color:#aaa">●●●</span>' : inp(r.address2||'','address2',i,'150px')}</td>
      <td style="padding:4px;vertical-align:top">${demoMode ? '<span style="color:#aaa">●●●</span>' : inp(r.address3||'','address3',i,'120px')}</td>
      <td style="padding:4px;vertical-align:top">${demoMode ? '<span style="color:#aaa">●●●</span>' : inp(r.address4||'','address4',i,'100px')}</td>
      <td style="padding:4px;vertical-align:top">
        ${sel(r.content,'content',i,['コーヒー豆','コーヒー豆（挽き豆）','ドリップバッグコーヒー'])}

  }).join('');

          <th style="padding:8px;text-align:left;color:var(--green);white-space:nowrap">住所1行目<span style="font-size:0.7rem;color:#aaa">（丁目番地）</span></th>
          <th style="padding:8px;text-align:left;color:var(--green);white-space:nowrap">住所2行目<span style="font-size:0.7rem;color:#aaa">（マンション）</span></th>
          <th style="padding:8px;text-align:left;color:var(--green);white-space:nowrap">住所3行目<span style="font-size:0.7rem;color:#aaa">（部屋番号）</span></th>
          <th style="padding:8px;text-align:left;color:var(--green);white-space:nowrap">住所4行目</th>
          <th style="padding:8px;text-align:left;color:var(--green)">内容品</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    ${notice}
    <div style="margin-top:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <button onclick="downloadClickpostCSV()"
        style="background:var(--green);color:white;border:none;border-radius:8px;padding:9px 18px;font-size:0.88rem;font-weight:700;cursor:pointer">
        📥 クリックポスト用CSVをダウンロード
      </button>
      <button onclick="document.getElementById('clickpostSelection').innerHTML='';document.getElementById('clickpostStatus').textContent='ファイルを選択してください'"
        style="background:white;color:#888;border:1px solid #ddd;border-radius:8px;padding:9px 14px;font-size:0.85rem;cursor:pointer">
        キャンセル

      <span style="font-size:0.78rem;color:#aaa">※ 各セルは直接編集できます</span>
    </div>`;
}

// 行編集時の不一致チェック・ハイライト更新
function _clickpostRecheck(i) {
  const r = _clickpostData[i];
  if (!r) return;
  const origDigits = _clickpostDigits(r.addrOriginal);
  const splitDigits = _clickpostDigits([r.address1,r.address2,r.address3,r.address4].join(''));
  const mismatch = origDigits !== splitDigits;
  const tr = document.querySelector(`#clickpostSelection tbody tr[data-ci="${i}"]`);
  if (tr) {
    tr.style.background = mismatch ? '#fff3e0' : '';
    const badgeHost = tr.querySelector('[data-badge]');
    if (badgeHost) {
      badgeHost.innerHTML = mismatch
        ? `<span title="元の住所と分割結果の数字が一致しません" style="display:inline-block;background:#e65100;color:white;font-size:0.65rem;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:4px">要確認</span>`
        : `<span title="元の住所と数字が一致しています" style="display:inline-block;color:#2e7d32;font-size:0.8rem;margin-left:4px">✓</span>`;
    }
  }
}

// ===== 郵便番号 ↔ 住所 整合性チェック =====
// zipcloud API を使用（無料・登録不要）
// https://zipcloud.ibsnet.co.jp/doc/api
async function verifyZipCodes() {
  for (let i = 0; i < _clickpostData.length; i++) {
    const r = _clickpostData[i];
    const el = document.querySelector(`[data-zipcheck="${i}"]`);
    if (!el) continue;
    const zip = (r.zip || '').replace(/[^0-9]/g, '');
    if (!zip || zip.length !== 7) {
      el.innerHTML = '<span style="color:#e65100">⚠️ 郵便番号が不正</span>';
      r._zipStatus = 'invalid';
      continue;
    }
    el.innerHTML = '<span style="color:#aaa">確認中...</span>';
    try {
      const res = await fetch(`https://zipcloud.ibsnet.co.jp/api/search?zipcode=${zip}`);
      const data = await res.json();
      if (!data.results || !data.results.length) {
        el.innerHTML = '<span style="color:#e65100" title="この郵便番号は存在しません">⚠️ 該当なし</span>';
        r._zipStatus = 'notfound';
        continue;
      }
      // API結果の住所（都道府県＋市区町村＋町域）
      const result = data.results[0];
      const apiAddr = (result.address1 || '') + (result.address2 || '') + (result.address3 || '');
      // 元の住所の先頭部分と照合
      const origAddr = (r.addrOriginal || '').replace(/\s+/g, '');
      // 都道府県＋市区町村が含まれているかチェック
      const prefCity = (result.address1 || '') + (result.address2 || '');
      if (origAddr.includes(result.address1) && origAddr.includes(result.address2)) {
        el.innerHTML = `<span style="color:#2e7d32" title="${escHtml(apiAddr)}">✓ 一致</span>`;
        r._zipStatus = 'ok';
      } else {
        el.innerHTML = `<span style="color:#e65100;font-weight:700" title="〒${zip} → ${escHtml(apiAddr)}">⚠️ 不一致</span>`
          + `<div style="color:#e65100;margin-top:2px;line-height:1.3">〒→ ${escHtml(prefCity)}</div>`;
        r._zipStatus = 'mismatch';
      }
    } catch (e) {
      el.innerHTML = '<span style="color:#aaa" title="API接続に失敗しました">— 確認不可</span>';
      r._zipStatus = 'error';
      console.error('Zip verify error:', e);
    }
    // API負荷を抑えるため200ms間隔で送信
    await new Promise(ok => setTimeout(ok, 200));
  }
  // 全件チェック完了後、不一致があればサマリー表示
  _updateZipSummary();
}
function _updateZipSummary() {
  const mismatchZips = _clickpostData.filter(r => r._zipStatus === 'mismatch');
  const notfoundZips = _clickpostData.filter(r => r._zipStatus === 'notfound');
  const invalidZips = _clickpostData.filter(r => r._zipStatus === 'invalid');
  const total = mismatchZips.length + notfoundZips.length + invalidZips.length;
  const container = document.getElementById('clickpostSelection');
  if (!container) return;
  const existing = document.getElementById('zipSummary');
  if (existing) existing.remove();
  if (total > 0) {
    const div = document.createElement('div');
    div.id = 'zipSummary';
    div.style.cssText = 'margin-top:10px;padding:8px 12px;background:#fff3e0;border-left:4px solid #e65100;border-radius:4px;font-size:0.85rem;color:#6d4c00';
    div.innerHTML = `🔍 郵便番号チェック: <strong>${total}件</strong>に問題があります`
      + (mismatchZips.length ? `（住所不一致: ${mismatchZips.length}件）` : '')
      + (notfoundZips.length ? `（該当なし: ${notfoundZips.length}件）` : '')
      + (invalidZips.length ? `（番号不正: ${invalidZips.length}件）` : '');
    // 注意書きの後ろに挿入
    const notices = container.querySelectorAll('[style*="border-left"]');
    const lastNotice = notices[notices.length - 1];
    if (lastNotice && lastNotice.nextSibling) lastNotice.parentNode.insertBefore(div, lastNotice.nextSibling);
    else container.appendChild(div);
  } else if (_clickpostData.length && _clickpostData.every(r => r._zipStatus === 'ok')) {
    const div = document.createElement('div');
    div.id = 'zipSummary';
    div.style.cssText = 'margin-top:10px;padding:8px 12px;background:#e8f5e9;border-left:4px solid var(--green);border-radius:4px;font-size:0.85rem;color:#2e5c30';
    div.innerHTML = '🔍 郵便番号チェック: ✅ 全件、郵便番号と住所が一致しています';
    const notices = container.querySelectorAll('[style*="border-left"]');
    const lastNotice = notices[notices.length - 1];
    if (lastNotice && lastNotice.nextSibling) lastNotice.parentNode.insertBefore(div, lastNotice.nextSibling);
    else container.appendChild(div);
  }
}

function downloadClickpostCSV() {
  if (demoMode) { alert('デモモード中はCSVをダウンロードできません'); return; }
  const selected = _clickpostData.filter(r => r.selected);
  if (!selected.length) { alert('送り先を1件以上選択してください'); return; }
  // ClickPost公式仕様: Shift-JIS / CRLF / 列順 = 郵便番号, 氏名, 敬称, 住所1-4行目, 内容品
  const header = 'お届け先郵便番号,お届け先氏名,お届け先敬称,お届け先住所1行目,お届け先住所2行目,お届け先住所3行目,お届け先住所4行目,内容品';
  // 値はカンマ・ダブルクォート・改行を含む場合のみクォート
  const q = v => {
    const s = (v == null) ? '' : String(v);
    return /[",\r\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  const csvRows = selected.map(r => [
    r.zip || '',
    q(r.name || ''),
    r.honorific || '様',
    q(r.address1 || ''),
    q(r.address2 || ''),
    q(r.address3 || ''),
    q(r.address4 || ''),
    q(r.content || '')
  ].join(','));
  const csvText = header + '\r\n' + csvRows.join('\r\n') + '\r\n';

  // Shift-JIS にエンコード（ClickPostはShift-JIS指定）
  if (typeof Encoding === 'undefined') {
    alert('エンコーディングライブラリの読み込みに失敗しました。ページを再読み込みしてください。');
    return;
  }
  const sjisArray = Encoding.convert(csvText, {
    to: 'SJIS',
    from: 'UNICODE',
    type: 'array'
  });
  const blob = new Blob([new Uint8Array(sjisArray)], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'clickpost_' + todayLocal() + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  document.getElementById('clickpostStatus').innerHTML = `<span style="color:var(--green);font-weight:600">✅ ${selected.length}件のCSVをダウンロードしました（Shift-JIS）</span>`;
  document.getElementById('clickpostSelection').innerHTML = '';
  _clickpostData = [];
}

// ===== 顧客データ バックアップCSVエクスポート =====
function exportBackupCSV() {
  if (demoMode) { alert('デモモード中はバックアップできません'); return; }
  if (!customers.length) { alert('バックアップする顧客データがありません'); return; }
  const rows = [];
  // ヘッダー行
  rows.push([
    '顧客ID', 'リベネーム', '本名', 'プロフィールURL', '画像URL',
    '電話番号', '郵便番号', '住所', 'メモ',
    '豆の種類', '挽き方', '登録日',
    '履歴ID', '商品名', '挽き方(履歴)', '金額', '注文日', '発送日', '備考'
  ].join(','));
  customers.forEach(c => {
    const hist = (c.history || []).slice().sort((a,b) => (b.date||'').localeCompare(a.date||''));
    if (hist.length === 0) {
      // 履歴がない顧客は1行で出力
      rows.push(csvRow([
        c.id, c.libeName||'', c.name||'', c.profileUrl||'', c.photoUrl||'',
        c.phone||'', c.zip||'', c.address||'', c.memo||'',
        c.beanType||'', c.grind||'', c.createdAt||'',
        '', '', '', '', '', '', ''
      ]));
    } else {
      // 履歴ごとに1行
      hist.forEach(h => {
        rows.push(csvRow([
          c.id, c.libeName||'', c.name||'', c.profileUrl||'', c.photoUrl||'',
          c.phone||'', c.zip||'', c.address||'', c.memo||'',
          c.beanType||'', c.grind||'', c.createdAt||'',
          h.id||'', h.product||'', h.grind||'', h.amount||'', h.date||'', h.shipDate||'', h.note||''
        ]));
      });
    }
  });
  const csvText = rows.join('\r\n') + '\r\n';
  // UTF-8 BOM付き（ExcelでUTF-8として認識させるため）
  const bom = '\uFEFF';
  const blob = new Blob([bom + csvText], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'backup_' + todayLocal() + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('💾 バックアップCSVをダウンロードしました（' + customers.length + '名分）');
}
function csvRow(arr) {
  return arr.map(v => {
    const s = (v == null) ? '' : String(v);
    return /[",\r\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  }).join(',');
}

function parseCSVRows(text) {
  const rows = [];
  let row = [], field = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQ) {
      if (ch === '"' && text[i+1] === '"') { field += '"'; i++; }
      else if (ch === '"') inQ = false;
      else field += ch;
    } else {
      if (ch === '"') inQ = true;
      else if (ch === ',') { row.push(field); field = ''; }
      else if (ch === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (ch !== '\r') field += ch;
    }
  }
  if (field || row.length) { row.push(field); rows.push(row); }
  return rows;
}

// ===== LocalStorage → Firebase 移行 =====
async function _migrateLocalStorage() {
  const raw = localStorage.getItem('fm_customers');
  if (!raw) return;
  const local = JSON.parse(raw);
  if (!local.length) { localStorage.removeItem('fm_customers'); return; }
  if (customers.length > 0) { localStorage.removeItem('fm_customers'); return; }
  if (!confirm(`このMacに${local.length}件のデータがあります。\nFirebaseに移行してiPadからも使えるようにしますか？`)) return;
  showToast('⏳ データを移行中...');
  for (let i = 0; i < local.length; i += 400) {
    const batch = db.batch();
    local.slice(i, i + 400).forEach(c => {
      const { id, ...data } = c;
      batch.set(db.collection('customers').doc(id), data);
    });
    await batch.commit();
  }
  localStorage.removeItem('fm_customers');
  showToast(`✅ ${local.length}件を移行しました！`);
}

// ===== サイドバー =====
function renderCustomerList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = customers.filter(c =>
    c.name.toLowerCase().includes(q) ||
    (c.kana||'').toLowerCase().includes(q) ||
    (c.libeName||'').toLowerCase().includes(q) ||
    (c.profileUrl||'').toLowerCase().includes(q)
  );
  // 商品フィルター
  const productFilter = (document.getElementById('productFilter')||{}).value || 'all';
  // 発送予定日フィルター
  const shipDateFilter = (document.getElementById('shipDateFilter')||{}).value || '';
  const filteredByShip = !shipDateFilter ? filtered : filtered.filter(c =>
    (c.history||[]).some(h => h.shipDate === shipDateFilter)
  );

  const filteredByProduct = productFilter === 'all' ? filteredByShip : filteredByShip.filter(c => {
    const hist = (c.history || []).filter(h => h.product);
    if (!hist.length) return false;
    // 直近の注文の商品で判定
    const latest = hist.slice().sort((x, y) => y.date.localeCompare(x.date))[0];
    if (productFilter === 'single') return latest.product.includes('シングルオリジン');
    if (productFilter === 'drip')   return latest.product.includes('ドリップバッグ');
    return true;
  });
  const isFiltered = q || productFilter !== 'all' || shipDateFilter;
  document.getElementById('customerCount').textContent =
    `全 ${customers.length} 名${isFiltered ? `（${filteredByProduct.length} 件）` : ''}`;

  const list = document.getElementById('customerList');
  if (!filteredByProduct.length) {
    list.innerHTML = `<div style="padding:24px;text-align:center;color:#aaa;font-size:0.85rem">${customers.length===0?'顧客を追加してください':'該当なし'}</div>`;
    return;
  }
  const sortKey = (document.getElementById('sortSelect')||{}).value || 'orderDate';
  const sorted = filteredByProduct.slice().sort((a, b) => {
    if (sortKey === 'orderDate') {
      const aV = (a.history||[]).length ? a.history.slice().sort((x,y)=>y.date.localeCompare(x.date))[0].date : '';
      const bV = (b.history||[]).length ? b.history.slice().sort((x,y)=>y.date.localeCompare(x.date))[0].date : '';
      if (!aV && !bV) return 0; if (!aV) return 1; if (!bV) return -1;
      return bV.localeCompare(aV);
    }
    if (sortKey === 'roastDate') {
      const aV = (a.history||[]).map(h=>h.roastDate||'').filter(Boolean).sort().reverse()[0] || '';
      const bV = (b.history||[]).map(h=>h.roastDate||'').filter(Boolean).sort().reverse()[0] || '';
      if (!aV && !bV) return 0; if (!aV) return 1; if (!bV) return -1;
      return bV.localeCompare(aV);
    }
    if (sortKey === 'count') {
      return (b.history||[]).length - (a.history||[]).length;
    }
    if (sortKey === 'name') {
      return (a.libeName||a.name||'').localeCompare(b.libeName||b.name||'', 'ja');
    }
    return 0;
  });
  list.innerHTML = sorted.map(c => {
    const cnt = (c.history||[]).length;
    const last = cnt ? c.history.slice().sort((a,b)=>b.date.localeCompare(a.date))[0].date : null;
    return `
      <div class="customer-item ${c.id===selectedCustomerId?'active':''}" onclick="selectCustomer('${c.id}')">
        ${avatarHtml(c, 'customer-avatar')}
        <div class="customer-item-info">
          <div class="customer-item-name">${c.libeName?`🌿 ${displayLibeName(c)} <span style="font-size:0.72rem;color:#aaa;font-weight:400">(${maskedName(c)})</span>`:maskedName(c)}</div>
          <div class="customer-item-sub">${last ? '最終: '+formatDate(last) : 'まだ記録なし'}</div>
        </div>
        ${cnt ? `<span class="customer-badge">${cnt}回</span>` : ''}
      </div>`;
  }).join('');
}

// ===== 顧客モーダル =====
function openCustomerModal(id) {
  editingCustomerId = id || null;
  document.getElementById('customerModalTitle').textContent = id ? '✏️ 顧客を編集' : '👤 顧客を追加';
  if (id) {
    const c = getCustomer(id);
    setVal('cName', c.name); setVal('cLibeName', c.libeName);
    setVal('cProfileUrl', c.profileUrl); setVal('cPhotoUrl', c.photoUrl||''); setVal('cMemo', c.memo);
  } else {
    ['cName','cLibeName','cProfileUrl','cPhotoUrl','cMemo'].forEach(i=>setVal(i,''));
  }
  previewPhoto();
  document.getElementById('customerModal').classList.add('open');
  document.getElementById('cName').focus();
}

async function saveCustomer() {
  const name = getVal('cName').trim();
  if (!name) { alert('お名前を入力してください'); return; }
  const data = {
    name,
    libeName: getVal('cLibeName').trim(),
    profileUrl: getVal('cProfileUrl').trim(),
    photoUrl: getVal('cPhotoUrl').trim(),
    memo: getVal('cMemo').trim(),
  };
  let toSave;
  if (editingCustomerId) {
    Object.assign(getCustomer(editingCustomerId), data);
    toSave = getCustomer(editingCustomerId);
    showToast('✅ 顧客情報を更新しました');
  } else {
    const newC = { id: generateId(), history: [], ...data };
    customers.push(newC);
    selectedCustomerId = newC.id;
    toSave = newC;
    showToast('✅ 顧客を追加しました');
  }
  await dbSave(toSave);
  closeModal('customerModal'); renderCustomerList();
  if (selectedCustomerId) renderDetail();
}

function previewPhoto() {
  const url = getVal('cPhotoUrl').trim();
  const name = getVal('cName').trim();
  const preview = document.getElementById('photoPreview');
  if (!preview) return;
  if (url) {
    preview.style.background = 'transparent';
    preview.innerHTML = `<img src="${escHtml(url)}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"
      onerror="this.parentElement.style.background='var(--green-mid)';this.parentElement.innerHTML='${escHtml((name||'?').charAt(0))}'">`;
  } else {
    preview.style.background = 'var(--green-mid)';
    preview.innerHTML = escHtml((name||'?').charAt(0));
  }
}

async function deleteCustomer(id) {
  const c = getCustomer(id);
  if (!confirm(`「${c.name}」を削除しますか？\n（履歴もすべて削除されます）`)) return;
  customers = customers.filter(x=>x.id!==id);
  selectedCustomerId = null;
  await dbDelete(id);
  renderCustomerList();
  document.getElementById('main').innerHTML = `<div class="empty-state"><div class="icon">☕</div><p>左から顧客を選んでください</p></div>`;
  showToast('🗑 削除しました');
}

// ===== 銘柄プルダウン =====
const PRESET_BEANS = ['エチオピアN','エチオピアW','ケニアW','ブルンジN'];

function onBeanChange(num) {
  const sel = document.getElementById(`hBean${num}Sel`).value;
  const custom = document.getElementById(`hBean${num}Custom`);
  custom.style.display = sel === 'その他' ? '' : 'none';
  if (sel !== 'その他') custom.value = '';
}

function getBeanValue(num) {
  const sel = getVal(`hBean${num}Sel`);
  return sel === 'その他' ? getVal(`hBean${num}Custom`).trim() : sel;
}

function setBeanValue(num, val) {
  const selEl = document.getElementById(`hBean${num}Sel`);
  const customEl = document.getElementById(`hBean${num}Custom`);
  if (!selEl || !customEl) return;
  if (!val) { selEl.value = ''; customEl.style.display = 'none'; customEl.value = ''; return; }
  if (PRESET_BEANS.includes(val)) { selEl.value = val; customEl.style.display = 'none'; customEl.value = ''; }
  else { selEl.value = 'その他'; customEl.style.display = ''; customEl.value = val; }
}

// ===== 商品選択による動的表示 =====
// ===== 商品ごとの既定価格 =====
// 今後値段が変わる可能性あり。変更時はここを書き換える。
const PRODUCT_PRICES = {
  '【２種】シングルオリジン': 2200,
  '【１種】シングルオリジン': 1300,
  '【4袋入り】ドリップバッグ': 1200,
  '【8袋入り】ドリップバッグ': 2000,
};

function onProductChange() {
  const p = document.getElementById('hProduct').value;
  const isSingle = p.includes('シングルオリジン');
  const hasProduct = p !== '';
  document.getElementById('secSingle').style.display = isSingle ? '' : 'none';
  document.getElementById('secCommon').style.display = hasProduct ? '' : 'none';

  // 金額の自動入力:
  //   - 空欄 → 既定価格を入れる
  //   - 既存の金額が他商品の既定価格と一致 → 商品切替と判断して上書き
  //   - 手入力された任意の金額 → 上書きしない
  const priceInput = document.getElementById('hAmount');
  if (priceInput && PRODUCT_PRICES[p] != null) {
    const current = (priceInput.value || '').trim();
    const knownPrices = Object.values(PRODUCT_PRICES).map(String);
    if (current === '' || knownPrices.includes(current)) {
      priceInput.value = PRODUCT_PRICES[p];
    }
  }
}

// ===== メッセージカード リコメンド機能 =====
function renderMessageRecommendations() {
  const wrap = document.getElementById('msgRecommend');
  const list = document.getElementById('msgRecommendList');
  if (!wrap || !list) return;

  // 全顧客の過去メッセージを収集（重複排除）
  const msgMap = new Map(); // message -> { text, lastDate, count, sentToCurrentCustomer }
  const currentCustId = selectedCustomerId;
  customers.forEach(c => {
    (c.history || []).forEach(h => {
      const msg = (h.message || '').trim();
      if (!msg) return;
      const existing = msgMap.get(msg);
      if (existing) {
        existing.count++;
        if (h.date > existing.lastDate) existing.lastDate = h.date;
        if (c.id === currentCustId) existing.sentToCurrentCustomer = true;
      } else {
        msgMap.set(msg, {
          text: msg,
          lastDate: h.date || '',
          count: 1,
          sentToCurrentCustomer: c.id === currentCustId
        });
      }
    });
  });

  // 現在の顧客の定番メモも候補に追加
  if (currentCustId) {
    const cc = getCustomer(currentCustId);
    const memo = (cc && cc.memo || '').trim();
    if (memo && !msgMap.has(memo)) {
      msgMap.set(memo, { text: memo, lastDate: '', count: 0, sentToCurrentCustomer: false, isTemplate: true });
    }
  }

  if (msgMap.size === 0) {
    wrap.style.display = 'none';
    return;
  }

  // ソート: 送信済みを下に、使用回数順→新しい順
  const msgs = Array.from(msgMap.values()).sort((a, b) => {
    if (a.sentToCurrentCustomer !== b.sentToCurrentCustomer) return a.sentToCurrentCustomer ? 1 : -1;
    if (a.isTemplate) return -1;
    if (b.isTemplate) return 1;
    if (b.count !== a.count) return b.count - a.count;
    return b.lastDate.localeCompare(a.lastDate);
  });

  // 最大10件表示
  const top = msgs.slice(0, 10);
  list.innerHTML = top.map(m => {
    const cls = m.sentToCurrentCustomer ? 'msg-chip used-for-this' : 'msg-chip';
    const preview = m.text.length > 80 ? m.text.substring(0, 80) + '…' : m.text;
    const meta = m.isTemplate
      ? '📌 この方の定番メモ'
      : m.count + '回使用' + (m.lastDate ? ' ・ 最終: ' + formatDate(m.lastDate) : '');
    return `<button class="${cls}" onclick="selectRecommendedMsg(this)" data-msg="${escHtml(m.text)}">
      ${escHtml(preview)}
      <div class="msg-chip-meta">${meta}</div>
    </button>`;
  }).join('');

  wrap.style.display = '';
}

function selectRecommendedMsg(btn) {
  const msg = btn.getAttribute('data-msg');
  document.getElementById('hMessage').value = msg;
  document.getElementById('hMessage').focus();
  showToast('📮 メッセージを選択しました');
}

async function saveHistory() {
  const date = getVal('hDate');
  const product = getVal('hProduct');
  if (!date) { alert('注文日を入力してください'); return; }
  if (!product) { alert('商品名を選択してください'); return; }
  const isSingle = product.includes('シングルオリジン');
  const data = {
    date,
    shipDate: getVal('hShipDate'),
    roastDate: getVal('hRoastDate'),
    amount: getVal('hAmount'),
    product,
    beanGrind: isSingle ? getVal('hBeanGrind') : '',
    bean1: isSingle ? getBeanValue('1') : '',
    bean1Note: isSingle ? getVal('hBean1Note').trim() : '',
    bean2: isSingle ? getBeanValue('2') : '',
    bean2Note: isSingle ? getVal('hBean2Note').trim() : '',
    bean3: isSingle ? getBeanValue('3') : '',
    bean3Note: isSingle ? getVal('hBean3Note').trim() : '',
    bean4: isSingle ? getBeanValue('4') : '',
    bean4Note: isSingle ? getVal('hBean4Note').trim() : '',
    bean5: isSingle ? getBeanValue('5') : '',
    bean5Note: isSingle ? getVal('hBean5Note').trim() : '',
    bean6: isSingle ? getBeanValue('6') : '',
    bean6Note: isSingle ? getVal('hBean6Note').trim() : '',
    bonusBean: isSingle ? getBeanValue('Bonus') : '',
    bonusBeanNote: isSingle ? getVal('hBonusBeanNote').trim() : '',
    seal: getVal('hSeal').trim(),
    message: getVal('hMessage').trim(),
    note: getVal('hNote').trim(),
  };
  const c = getCustomer(selectedCustomerId);
  if (editingHistoryId) {
    Object.assign(c.history.find(x=>x.id===editingHistoryId), data);
    showToast('✅ 記録を更新しました');
  } else {
    c.history.push({ id: generateId(), ...data });
    showToast('📦 発送を記録しました');
  }
  await dbSave(c);
  closeModal('historyModal'); renderDetail();
}

async function deleteHistory(historyId) {
  if (!confirm('この記録を削除しますか？')) return;
  const c = getCustomer(selectedCustomerId);
  c.history = c.history.filter(h=>h.id!==historyId);
  await dbSave(c);
  renderDetail();
  showToast('🗑 記録を削除しました');
}
